version: "3.8"

services:
  ambev.developerevaluation.database:
    container_name: ambev_developer_evaluation_database
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: DeveloperEvaluation
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Dev@123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d DeveloperEvaluation"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ambev.developerevaluation.webapi:
    container_name: ambev_developer_evaluation_webapi
    image: ambevdeveloperevaluationwebapi:local
    build:
      context: .
      dockerfile: src/Ambev.DeveloperEvaluation.WebApi/Dockerfile
    depends_on:
      ambev.developerevaluation.database:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=ambev.developerevaluation.database;Port=5432;Database=DeveloperEvaluation;Username=admin;Password=Dev@123456
      Jwt__SecretKey: YourSuperSecretKeyForJwtTokenGenerationThatShouldBeAtLeast32BytesLong
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
